name: autofix.ci
on:
  pull_request:
  push:
    branches:
      - main
permissions:
  contents: read
concurrency:
  group: autofix-${{ github.head_ref }}
  cancel-in-progress: true
jobs:
  autofix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3
      - uses: actions/setup-node@v7.0.0
        with:
          check-latest: true
          node-version: lts/*
      - run: yarn install
      - run: yarn run cleanup
      - run: yarn run build
      - uses: autofix-ci/action@c5b2d67aa2274e7b5a18224e8171550871fc7e4a
